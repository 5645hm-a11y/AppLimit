name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── JDK 17 (required by AGP 8.x) ────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Gradle permissions ───────────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x AppLimit/gradlew

      # ── Gradle cache ─────────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Debug build ──────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: cd AppLimit && ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AppLimit-debug
          path: AppLimit/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # ── Release build ─────────────────────────────────────────────────────────
      - name: Build Release APK (unsigned)
        run: cd AppLimit && ./gradlew assembleRelease --stacktrace --no-daemon

      # ── Sign release APK (only if keystore secrets are set) ──────────────────
      - name: Sign Release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        id: sign_apk
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: AppLimit/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          BUILD_TOOLS_VERSION: "34.0.0"

      # ── Upload signed APK (if signed) ─────────────────────────────────────────
      - name: Upload Signed Release APK
        if: ${{ steps.sign_apk.outputs.signedReleaseFile != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: AppLimit-release-signed
          path: ${{ steps.sign_apk.outputs.signedReleaseFile }}
          retention-days: 30

      # ── Upload unsigned APK (fallback) ────────────────────────────────────────
      - name: Upload Unsigned Release APK
        if: ${{ env.KEYSTORE_BASE64 == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: AppLimit-release-unsigned
          path: AppLimit/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 14
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # ── Attach APK to GitHub Release (on release event) ───────────────────────
      - name: Upload APK to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AppLimit/app/build/outputs/apk/debug/app-debug.apk
            ${{ steps.sign_apk.outputs.signedReleaseFile || 'AppLimit/app/build/outputs/apk/release/app-release-unsigned.apk' }}
